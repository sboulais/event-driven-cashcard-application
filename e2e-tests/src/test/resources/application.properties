spring.application.name=cashcard-transaction-e2e-tests
spring.cloud.function.definition=approvalRequest;enrichTransaction;sinkToFile

# Mappings entre les fonctions Spring Cloud Stream et les topics Kafka :
spring.cloud.stream.bindings.approvalRequest-out-0.destination=approvalRequest
spring.cloud.stream.bindings.enrichTransaction-in-0.destination=approvalRequest
spring.cloud.stream.bindings.enrichTransaction-out-0.destination=enrichTransaction
spring.cloud.stream.bindings.sinkToFile-in-0.destination=enrichTransaction
