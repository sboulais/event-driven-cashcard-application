spring.application.name=cashcard-enricher
spring.kafka.bootstrap-servers=localhost:9092
spring.cloud.function.definition=enrichTransaction
spring.cloud.stream.bindings.enrichTransaction-in-0.destination=approvalRequest-out-0

spring.cloud.stream.kafka.bindings.enrichTransaction-in-0.consumer.enable-dlq=true
spring.cloud.stream.kafka.bindings.enrichTransaction-in-0.consumer.dlq-name=enrichTransaction.DLQ
spring.cloud.stream.kafka.bindings.enrichTransaction-in-0.consumer.max-attempts=3
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
spring.kafka.consumer.group-id=enricher-group
spring.cloud.stream.bindings.enrichTransaction-in-0.group=enricher-group


